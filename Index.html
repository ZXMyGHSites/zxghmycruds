<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX CRUD Projects Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e38 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-border-hover: rgba(56, 189, 248, 0.4); /* Φωτεινό border στο hover */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;       /* Neon Μπλε */
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
        }

        /* 🔒 LOGIN CONTAINER */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            padding: 12px 14px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* 🚀 HUB CONTAINER */
        .hub-container {
            max-width: 900px;
            width: 100%;
            align-self: flex-start;
        }

        .hub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .hub-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; /* Για παλιότερους browsers & Safari */
            background-clip: text;         /* Η επίσημη standard ιδιότητα που ζητάει το VS Code */
            -webkit-text-fill-color: transparent;
        }
        
        /* BUTTONS */
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #0f172a;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px 16px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        /* 📋 ΔΙΑΤΑΞΗ ΑΝΑ ΣΕΙΡΑ (ΛΙΣΤΑ) */
        .grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--card-border); /* Σταθερό αρχικό border */
            border-radius: 14px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        /* ΒΕΛΤΙΩΜΕΝΟ HOVER ΜΕ ΦΩΤΕΙΝΟ BORDER & NEON GLOW */
        .card:hover {
            border-color: var(--card-border-hover);
            background: rgba(30, 41, 59, 0.85);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), 0 0 12px rgba(56, 189, 248, 0.15);
            transform: translateX(4px); /* Μικρή κίνηση προς τα δεξιά αντί για πάνω, δείχνει υπέροχα σε λίστες */
        }

        .card-main {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-align: left;
            width: 100%;
            gap: 20px;
        }

        .project-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            transition: transform 0.25s ease;
        }

        .card:hover .project-logo {
            transform: scale(1.05);
        }

        .project-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: white;
        }

        .project-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        .hidden { display: none !important; }
        .error-msg { color: var(--danger); font-size: 14px; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="loginSection" class="container">
        <h2>🔒 Είσοδος στο ZX CRUD Projects Hub</h2>
        <div class="form-group">
            <label>Όνομα Χρήστη (Username)</label>
            <input type="text" id="username" placeholder="π.χ. admin">
        </div>
        <div class="form-group">
            <label>Κωδικός Πρόσβασης (Password)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="loginBtn">Σύνδεση</button>
        <p id="errorArea" class="error-msg hidden">Λάθος στοιχεία πρόσβασης!</p>
    </div>

    <div id="hubSection" class="hub-container hidden">
        <div class="hub-header">
            <h1>🚀 ZX CRUD Projects Hub</h1>
            <button id="logoutBtn" class="logout-btn">Αποσύνδεση</button>
        </div>
        
        <div class="grid" id="projectsGrid">
            </div>
    </div>

<script>
    // Στοιχεία Σύνδεσης
    const CORRECT_USER = "admin";
    const CORRECT_PASS = "zx123";

    // DOM Στοιχεία
    const loginSection = document.getElementById('loginSection');
    const hubSection = document.getElementById('hubSection');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const errorArea = document.getElementById('errorArea');
    const gridContainer = document.getElementById('projectsGrid');

    // --- ΔΙΑΔΙΚΑΣΙΑ LOGIN ---
    loginBtn.addEventListener('click', () => {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === CORRECT_USER && pass === CORRECT_PASS) {
            sessionStorage.setItem('isLoggedIn', 'true');
            showHub();
        } else {
            errorArea.classList.remove('hidden');
        }
    });

    // --- ΕΛΕΓΧΟΣ SESSION (Refresh Page) ---
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        showHub();
    }

    function showHub() {
        loginSection.classList.add('hidden');
        hubSection.classList.remove('hidden');
        loadJsonAndRenderCards();
    }

    // --- ΦΟΡΤΩΣΗ JSON & ΔΗΜΙΟΥΡΓΙΑ ΟΡΙΖΟΝΤΙΩΝ CARDS ---
    function loadJsonAndRenderCards() {
        fetch('zxjsoncrud.json')
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(projects => {
                gridContainer.innerHTML = '';
                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.open(project.URL, '_blank');
                    
                    // Δομή με 'card-main' για σωστή οριζόντια στοίχιση (Logo αριστερά, Κείμενα δεξιά)
                    card.innerHTML = `
                        <div class="card-main">
                            <img src="${project.LogoIcon || 'https://via.placeholder.com/60'}" class="project-logo" alt="Logo">
                            <div>
                                <h3 class="project-title">${project.name}</h3>
                                <p class="project-desc">${project.description}</p>
                            </div>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            })
            .catch(() => {
                gridContainer.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top: 40px;">Παρακαλώ βεβαιωθείτε ότι το αρχείο zxjsoncrud.json βρίσκεται στον ίδιο φάκελο και περιέχει έγκυρα δεδομένα.</p>';
            });
    }

    // --- LOGOUT ---
    logoutBtn.addEventListener('click', () => {
        sessionStorage.removeItem('isLoggedIn');
        window.location.reload();
    });
</script>
</body>
</html>
